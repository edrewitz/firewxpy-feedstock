{% set name = "firewxpy" %}
{% set version = "2.1" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/firewxpy-{{ version }}.tar.gz
  sha256: 1ef780a902a9ade6c63ae5207e2c53e6a69d11b8bf8f14cae45ece677cc9d0a4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.7
    - wxdata >=2.0.2
    - shapeography >=1.2

test:
  imports:
    - firewxpy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/edrewitz/firewxpy
  summary: Weather Analysis and Forecasting For Fire Weather
  license: MIT
  license_file: LICENSE
  doc_url: https://pypi.org/project/firewxpy/
  dev_url: https://github.com/edrewitz/firewxpy
  description: |

    Project Description
    -------------------
    FireWxPy is an open-source Python package that automates the creation of various types of weather analysis visualizations with a focus on fire weather.

extra:
  recipe-maintainers:
    - edrewitz
