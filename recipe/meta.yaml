{% set name = "firewxpy" %}
{% set version = "2.0" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/firewxpy-{{ version }}.tar.gz
  sha256: 9dac980ee4a24819987e909ddf419b05be05a02ca98f7868ab691354ca6bb658

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.7
    - wxdata >=2.0.1
    - shapeography >=1.2

test:
  imports:
    - firewxpy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/edrewitz/firewxpy
  summary: Weather Analysis and Forecasting For Fire Weather
  license: MIT
  license_file: LICENSE
  doc_url: https://pypi.org/project/firewxpy/
  dev_url: https://github.com/edrewitz/firewxpy

extra:
  recipe-maintainers:
    - edrewitz
